<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="opening-coach-api-base-url" content="https://chess-app-production-cd44.up.railway.app" />
  <title>Opening Coach</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">Chess Learning App</p>
      <h1>Opening Coach</h1>
      <p>Train critical openings, get instant move feedback, and track progress per account with spaced repetition.</p>
    </header>

    <section class="workspace">
      <aside class="panel controls">
        <section id="accountSection" class="control-section">
          <h2>Account</h2>

          <div id="accountExpanded">
            <label class="input-block" for="userSelect">Saved users</label>
            <select id="userSelect"></select>

            <label class="input-block" for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="Enter password" />

            <div class="button-row">
              <button id="loginBtn">Log In</button>
            </div>

            <label class="input-block" for="newUsername">New username</label>
            <input id="newUsername" type="text" placeholder="Create username" />

            <label class="input-block" for="newPassword">New password</label>
            <input id="newPassword" type="password" placeholder="Create password" />

            <button id="createUserBtn" class="accent-alt">Create Account</button>
            <p id="accountStatus" class="status"></p>
          </div>

          <div id="accountCompact" class="account-compact" hidden>
            <p id="accountCompactUser" class="status"></p>
            <button id="logoutBtn" class="secondary">Log Out</button>
          </div>
        </section>

        <section class="control-section">
          <h2>Lesson Setup</h2>

          <label class="input-block" for="sideSelect">Your side</label>
          <select id="sideSelect">
            <option value="w">White</option>
            <option value="b">Black</option>
          </select>

          <label class="input-block" for="modeSelect">Training mode</label>
          <select id="modeSelect">
            <option value="opening">Opening Focus</option>
            <option value="spaced">Spaced Repetition</option>
          </select>

          <label class="input-block" for="openingSelect">Opening</label>
          <select id="openingSelect"></select>

          <label class="input-block" for="strengthSelect">Opponent strength</label>
          <select id="strengthSelect">
            <option value="1">1 (Easiest)</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5 (Strongest)</option>
          </select>

          <div class="button-row">
            <button id="resetBtn">Start Lesson</button>
            <button id="hintBtn" class="secondary">Show Hint</button>
          </div>

          <p id="spacedStatus" class="status"></p>
          <p id="lessonStatus" class="status"></p>
          <p id="gameStatus" class="status"></p>
        </section>
      </aside>

      <section class="panel board-panel">
        <div class="board-frame">
          <div id="rankLabels" class="rank-labels" aria-hidden="true"></div>
          <div id="board" class="board" aria-label="Chess board"></div>
          <div class="board-corner" aria-hidden="true"></div>
          <div id="fileLabels" class="file-labels" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="panel coach">
        <h2 id="openingName"></h2>
        <p id="openingDescription"></p>

        <div class="progress-shell" aria-hidden="true">
          <div id="progressBar"></div>
        </div>
        <p id="progressText" class="small-text"></p>

        <h3>Move Ideas</h3>
        <p id="coachingText" class="small-text"></p>
        <ul id="coachingList" class="line-list compact-list"></ul>

        <h3>Book Variations</h3>
        <ol id="openingLine" class="line-list"></ol>

        <h3>Your Stats</h3>
        <p id="statsSummary" class="small-text"></p>
        <ul id="statsList" class="line-list compact-list"></ul>

        <h3>Game Moves</h3>
        <ol id="moveLog" class="line-list"></ol>
      </aside>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
